        body {

            background-color: #f9f9f9;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            color: white;
            text-align: center;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

            background-color: #f0f0f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
        }

            font-size: 16px;
            margin: 5px 0;
        }
        .info strong {
            color: #000;
        }
        .header {
            background: #000;
            padding: 15px;
            color: white;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        .header img {
            margin: 0.5rem;
        }
        .header h3 {
            margin: 0;
            font-size: 20px;
        }
        .footer {
            background-color: #000;
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }
        .footer p {
            margin: 5px 0;
        }
        .footer .links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .footer a {
            color: #fff;
            text-decoration: none;
        }

        a {
            color: white;
            font-weight: normal;
        }
